  <script>
    (function(){
      const mobileMenu = document.getElementById('mobile-menu');
      const burger = document.querySelector('.burger');
      if(!mobileMenu || !burger){ return; }

      let isOpen = false;
      const setState = (open) => {
        isOpen = open;
        document.body.classList.toggle('nav-open', open);
        burger.setAttribute('aria-expanded', String(open));
        mobileMenu.setAttribute('aria-hidden', String(!open));
      };

      burger.addEventListener('click', () => setState(!isOpen));
      document.addEventListener('keydown', (event) => {
        if(event.key === 'Escape' && isOpen){ setState(false); }
      });
      mobileMenu.querySelectorAll('a').forEach(link => link.addEventListener('click', () => setState(false)));

      const mq = window.matchMedia('(min-width: 768px)');
      const onChange = (e) => { if(e.matches){ setState(false); } };
      if(mq.addEventListener){ mq.addEventListener('change', onChange); } else if(mq.addListener){ mq.addListener(onChange); }

      setState(false);
    })();
  </script>
